<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>联德租赁 | 智能设备租赁管理系统</title>
    <!-- 引入字体与图标库 -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 整体布局 */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* ========= 侧边栏样式 - 移动端默认隐藏，通过汉堡菜单激活 ========= */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease-in-out;
            z-index: 1000;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            transform: translateX(-100%);
            overflow-y: auto;
        }

        /* 侧边栏打开状态 */
        .sidebar.open {
            transform: translateX(0);
        }

        /* 桌面端侧边栏常驻 */
        @media (min-width: 992px) {
            .sidebar {
                transform: translateX(0);
                position: relative;
                z-index: 10;
            }

            .menu-toggle {
                display: none !important;
            }

            .sidebar-overlay {
                display: none !important;
            }
        }

        /* 移动端遮罩层 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* 品牌区域 */
        .brand {
            padding: 24px 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }

        .brand h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand p {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 6px;
            font-weight: 400;
        }

        /* 导航菜单 */
        .nav-menu {
            flex: 1;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item i {
            width: 22px;
            font-size: 1.2rem;
            text-align: center;
        }

        .nav-item:hover {
            background: #1e293b;
            color: white;
        }

        .nav-item.active {
            background: #2d3a5e;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        /* 分组标题 */
        .nav-group-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 16px 8px 16px;
            color: #5b6e8c;
            font-weight: 600;
        }

        /* 底部技术支持 */
        .sidebar-footer {
            padding: 20px 16px 24px;
            border-top: 1px solid #2d3a4e;
            font-size: 0.7rem;
            color: #6c7f9c;
            text-align: center;
            line-height: 1.4;
        }

        /* ========= 右侧主内容 ========= */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f8fafc;
            width: 100%;
        }

        /* 顶部栏 - 移动端增加汉堡菜单按钮 */
        .top-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9edf2;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #1e293b;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-toggle:hover {
            background: #f1f5f9;
        }

        .page-title {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2c3e66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-area i {
            font-size: 1.2rem;
            color: #5b6e8c;
            cursor: pointer;
            transition: color 0.2s;
        }

        .user-area i:hover {
            color: #2c3e66;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: #eef2ff;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2c3e66;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 内容区域卡片网格 */
        .content-pane {
            padding: 20px 16px;
        }

        /* 桌面端增加内边距 */
        @media (min-width: 768px) {
            .content-pane {
                padding: 28px 32px;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .top-bar {
                padding: 14px 28px;
            }
        }

        /* 快捷卡片区 (工作台概览) 移动端自适应 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (min-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
            }
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            border: 1px solid #edf2f7;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.1);
        }

        .stat-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #5b6e8c;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-number {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
        }

        @media (min-width: 768px) {
            .stat-number {
                font-size: 2rem;
            }
        }

        /* 表格卡片 - 移动端滚动 */
        .data-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow-x: auto;
        }

        @media (min-width: 768px) {
            .data-card {
                padding: 20px 24px;
                margin-bottom: 28px;
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }

        @media (min-width: 768px) {
            .card-header h3 {
                font-size: 1.25rem;
            }
        }

        .badge-action {
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c3e66;
            cursor: default;
            white-space: nowrap;
        }

        /* 搜索栏样式 - 优化体验 */
        .search-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            background: white;
            padding: 6px 16px;
            border-radius: 48px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .search-bar:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-bar i {
            color: #94a3b8;
            font-size: 1rem;
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .search-bar input::placeholder {
            color: #cbd5e1;
        }

        .search-clear {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .search-clear:hover {
            color: #475569;
            background: #f1f5f9;
        }

        /* 表格样式 - 移动端水平滚动友好 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        @media (max-width: 640px) {
            table {
                min-width: 700px;
            }
        }

        th {
            text-align: left;
            padding: 12px 12px 12px 0;
            font-weight: 600;
            color: #475569;
            border-bottom: 1px solid #e9edf2;
            font-size: 0.8rem;
        }

        td {
            padding: 14px 12px 14px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 0.85rem;
            color: #1f2a44;
        }

        .status-badge {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }

        .status-warning {
            background: #fff3e3;
            color: #b45309;
        }

        .status-overdue {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-icon {
            color: #3b6e9e;
            cursor: pointer;
            margin-right: 8px;
        }

        /* 客情维护/销售线索简易卡片 */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr 1fr;
                gap: 24px;
            }
        }

        .clue-item {
            background: #fefce8;
            border-left: 4px solid #eab308;
            padding: 10px 12px;
            border-radius: 14px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .copyright {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            padding: 16px 0 8px;
            border-top: 1px solid #e2e8f0;
            margin-top: 12px;
        }

        .no-result {
            text-align: center;
            padding: 48px 20px;
            color: #94a3b8;
        }

        .no-result i {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* 移动端微调 */
        @media (max-width: 480px) {
            .user-area i:first-child {
                display: none;
            }

            .user-area {
                gap: 10px;
            }

            .avatar {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }

            .badge-action {
                font-size: 0.65rem;
                padding: 3px 10px;
            }
        }

       .vertical-company {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight: 900;
    font-size: 0.7rem;           /* 基础默认（适用于小屏平板） */
    letter-spacing: 6px;
    color: #d9512c;
    background: linear-gradient(135deg, #e55a32, #b83a1a);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 2px 2px 18px rgba(210, 80, 40, 0.5);
    white-space: nowrap;
    z-index: 99;
    pointer-events: none;
    opacity: 0.85;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
}

/* 移动端（手机） - 最小 */
@media (max-width: 640px) {
    .vertical-company {
        font-size: 0.55rem;       /* 手机端更小 */
        letter-spacing: 3px;
        right: 4px;
        opacity: 0.7;
    }
    body {
        padding-right: 1.5rem;
    }
}

/* 电脑端（桌面） - 比原版小，但比手机大 */
@media (min-width: 1024px) {
    .vertical-company {
        font-size: 1.0rem;        /* 原1.9rem → 改成1.0rem，电脑端也变小了 */
        letter-spacing: 8px;
        right: 24px;
        opacity: 0.8;
    }
}

/* 超大屏幕可选稍微大一点但仍比原版小 */
@media (min-width: 1440px) {
    .vertical-company {
        font-size: 1.1rem;
        letter-spacing: 10px;
    }
}
    </style>
</head>

<body>
    <div class="vertical-company">重庆联新德科技有限公司</div>
    <div class="app-container">
        <!-- 移动端遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="brand">
                <h1>联德租赁</h1>
                <p>Liande Lease · 智慧租凭</p>
            </div>
            <div class="nav-menu">
                <div class="nav-item active" data-view="dashboard">

                <div class="nav-group-title">分组管理</div>

                </div>

                    <i class="fas fa-cloud-upload-alt"></i>

                <div class="nav-item" data-view="recycle">

            </div>
            <div class="sidebar-footer">
                <i class="far fa-copyright"></i> 北京联德租赁 All Rights Reserved<br>

            </div>
        </div>

        <!-- 右侧内容区域 -->
        <div class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle" aria-label="菜单">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="page-title" id="mainTitle">工作台</div>
                <div class="user-area">
                    <i class="far fa-bell"></i>
                    <i class="fas fa-cog"></i>
                    <div class="avatar">李</div>
                </div>
            </div>
            <div class="content-pane" id="dynamicContent">
                <!-- 动态渲染 -->
            </div>
        </div>
    </div>

    <script>
        // ======================== 丰富的订单数据（用于检索功能，性能优化）========================
        const ordersData = [
            { id: 'LD2408-101', customer: '华云数字', product: '浪潮服务器*2', period: '2024-08-01 ~ 2024-11-01', account: '6217****1111 工商银行', 收款账户: '6217****1111 工商银行', amount: '¥18,000', status: '进行中', statusType: 'normal' },
            { id: 'LD2408-102', customer: '智创未来', product: 'RTX 4090工作站', period: '2024-09-10 ~ 2024-10-10', account: '6217****2222 工商银行', 收款账户: '6217****2222 工商银行', amount: '¥6,500', status: '待归还', statusType: 'warning' },
            { id: 'LD2409-203', customer: '博瑞传媒', product: '索尼FX6摄影机', period: '2024-09-15 ~ 2024-09-30', account: '6217****3333 工商银行', 收款账户: '6217****3333 工商银行', amount: '¥4,200', status: '已完成', statusType: 'normal' },
            { id: 'LD2410-001', customer: '智绘设计', product: '专业图形工作站', period: '2024-10-01 ~ 2024-10-30', account: '6215****8888 建设银行', 收款账户: '6215****8888 建设银行', amount: '¥7,500', status: '租赁中', statusType: 'normal' },
            { id: 'LD2410-045', customer: '深蓝医疗', product: '会议大屏86寸', period: '2024-09-20 ~ 2024-10-20', account: '6230****6666 农业银行', 收款账户: '6230****6666 农业银行', amount: '¥2,800', status: '逾期', statusType: 'overdue' },
            { id: 'LD2411-012', customer: '云创动力', product: '高性能服务器集群', period: '2024-11-01 ~ 2025-01-31', account: '6217****9999 工商银行', 收款账户: '6217****9999 工商银行', amount: '¥32,000', status: '进行中', statusType: 'normal' },
            { id: 'LD2411-089', customer: '智云科技', product: 'MacBook Pro 16寸', period: '2024-11-05 ~ 2024-12-05', account: '6215****1234 建设银行', 收款账户: '6215****1234 建设银行', amount: '¥3,200', status: '待发货', statusType: 'warning' },
            { id: 'LD2411-102', customer: '华云数字', product: '网络存储设备', period: '2024-11-10 ~ 2024-12-10', account: '6217****1111 工商银行', 收款账户: '6217****1111 工商银行', amount: '¥5,600', status: '租赁中', statusType: 'normal' }
        ];

        // 辅助函数：转义HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 根据状态返回样式类
        function getStatusClass(statusType, status) {
            if (statusType === 'overdue' || status === '逾期') return 'status-overdue';
            if (status === '待归还' || status === '待发货') return 'status-warning';
            return 'status-badge';
        }

        // 渲染订单表格（高性能，直接操作DOM字符串）
        function renderOrdersTable(orderList) {
            if (!orderList || orderList.length === 0) {
                return `
                <div class="no-result">
                    <i class="fas fa-search"></i>
                    <p>未找到相关订单，请尝试其他关键词</p>
                </div>
            `;
            }
